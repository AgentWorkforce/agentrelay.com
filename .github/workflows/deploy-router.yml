name: Deploy Router (Cloudflare)

on:
  push:
    branches:
      - main
    paths:
      - router/**
      - .github/workflows/deploy-router.yml
  workflow_dispatch:

concurrency:
  group: deploy-router-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-router:
    name: Deploy router
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy router to Cloudflare
        working-directory: router
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: ../node_modules/.bin/wrangler deploy
